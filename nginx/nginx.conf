# فایل پیکربندی Nginx برای لاراول در Docker
server {
    # Nginx روی پورت 80 داخل کانتینر گوش می‌دهد
    listen 80;
    listen [::]:80;
    server_name localhost myshop.test; # نام‌های دامنه که Nginx به آن‌ها پاسخ می‌دهد
    root /var/www/public; # مسیر ریشه پروژه لاراول در کانتینر app

    # ایندکس فایل‌ها و اولویت آن‌ها
    index index.php index.html index.htm;

    # تنظیمات برای لاگ‌ها
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # تنظیمات برای ارسال درخواست‌ها به PHP-FPM
    location / {
        try_files $uri $uri/ /index.php?$query_string; # تلاش برای یافتن فایل، در غیر این صورت ارسال به index.php
    }

    # تنظیمات برای پردازش فایل‌های PHP توسط PHP-FPM
    location ~ \.php$ {
        # آدرس PHP-FPM در شبکه Docker (نام سرویس app و پورت 9000 داخلی)
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # جلوگیری از دسترسی به فایل‌های .env و سایر فایل‌های حساس
    location ~ /\.env {
        deny all;
    }
}
