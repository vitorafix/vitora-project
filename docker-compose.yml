services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    volumes:
      - .:/var/www # مپ کردن کد پروژه
    # 🟢 حذف: پورت مستقیم برای app دیگر نیازی نیست، Nginx آن را مدیریت می‌کند
    # ports:
    #   - "8080:8000"
    depends_on:
      - redis
      - mongodb
      - mysql_db
    networks:
      - laravel

  # 🟢 جدید: سرویس Nginx
  nginx:
    image: nginx:stable-alpine # ایمیج سبک Nginx
    container_name: nginx_server
    ports:
      - "8080:80" # 🟢 تغییر: پورت هاست 8080 به پورت 80 Nginx مپ می‌شود
    volumes:
      - .:/var/www # مپ کردن کد پروژه برای Nginx
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf # مپ کردن فایل پیکربندی Nginx
    depends_on:
      - app # Nginx به app (PHP-FPM) وابسته است
    networks:
      - laravel

  redis:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    networks:
      - laravel

  mongodb:
    image: mongo:6
    container_name: mongo_db
    ports:
      - "27017:27017"
    networks:
      - laravel
    environment:
      MONGO_INITDB_ROOT_USERNAME: ariyadel12
      MONGO_INITDB_ROOT_PASSWORD: 6Z7MT=fe%tr%zcE9
      MONGO_INITDB_DATABASE: analytics_db

  mysql_db:
    image: mysql:8.0
    container_name: mysql_database
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 6Z7MT=fe%tr%zcE9
      MYSQL_DATABASE: myshop_db
      MYSQL_USER: ariyadel12
      MYSQL_PASSWORD: 6Z7MT=fe%tr%zcE9
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_interface
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql_db
      MYSQL_ROOT_PASSWORD: 6Z7MT=fe%tr%zcE9
    depends_on:
      - mysql_db
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  mysql_data:
